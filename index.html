<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#11151f">
<title>Bracket – Single Elimination</title>
<style>
  :root{
    --bg:#11151f;
    --panel:#182037;
    --border:#2a3450;
    --text:#eef0f4;
    --text-dim:#7c87a0;
    --gold:#e8a838;
    --teal:#5fb3a8;
  }
  *{ box-sizing:border-box; }
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-tap-highlight-color:transparent;
  }
  .eyebrow{
    text-transform:uppercase;
    letter-spacing:1.5px;
    font-size:.72rem;
    font-weight:700;
    color:var(--teal);
  }
  header{
    padding:24px 16px 16px;
    text-align:center;
    border-bottom:1px solid var(--border);
  }
  header h1{
    margin:6px 0 0;
    font-size:1.9rem;
    font-weight:800;
    letter-spacing:.5px;
  }
  .title-rule{
    width:44px; height:3px; background:var(--gold);
    margin:10px auto 0; border-radius:2px;
  }
  header p{
    margin:10px auto 0;
    max-width:280px;
    color:var(--text-dim);
    font-size:.82rem;
    line-height:1.4;
  }
  .setup{
    max-width:460px;
    margin:0 auto;
    padding:18px 16px;
  }
  textarea, input[type=text]{
    width:100%;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:10px;
    color:var(--text);
    padding:11px 13px;
    font-size:.95rem;
    font-family:inherit;
  }
  textarea{ min-height:80px; resize:vertical; }
  textarea:focus, input:focus{ outline:none; border-color:var(--teal); }
  .ghost-btn{
    width:100%;
    margin-top:8px;
    background:transparent;
    border:1px solid var(--border);
    color:var(--text-dim);
    border-radius:10px;
    padding:9px;
    font-size:.85rem;
    cursor:pointer;
  }
  .row{ display:flex; gap:8px; margin-top:14px; }
  .row input{ flex:1; }
  .add-btn{
    background:var(--teal);
    color:var(--bg);
    border:none;
    border-radius:10px;
    padding:0 18px;
    font-weight:700;
    font-size:.9rem;
    cursor:pointer;
  }
  .taglist{ display:flex; flex-wrap:wrap; gap:6px; margin-top:12px; }
  .tag{
    display:flex; align-items:center;
    background:var(--panel); border:1px solid var(--border);
    border-radius:20px; padding:6px 6px 6px 13px;
    font-size:.85rem; gap:4px;
  }
  .tag button{
    background:none; border:none; color:var(--text-dim);
    font-size:1.05rem; line-height:1; padding:3px 7px; cursor:pointer;
  }
  .count{ color:var(--text-dim); font-size:.8rem; margin-top:8px; }
  .main-btn{
    width:100%; margin-top:16px;
    background:var(--gold); color:var(--bg);
    border:none; border-radius:10px;
    padding:13px; font-size:1rem; font-weight:800;
    letter-spacing:.3px;
    cursor:pointer;
  }
  .main-btn:active{ opacity:.85; }

  .bracket-wrap{ overflow-x:auto; padding:8px 16px 36px; -webkit-overflow-scrolling:touch; }
  .bracket{ display:flex; gap:30px; width:max-content; margin:0 auto; }
  .round{ display:flex; flex-direction:column; justify-content:space-around; gap:14px; min-width:175px; }
  .round-title{
    text-align:center; color:var(--text-dim);
    font-size:.72rem; text-transform:uppercase; letter-spacing:1.2px;
    font-weight:700; padding-bottom:6px;
    border-bottom:1px solid var(--border); margin-bottom:10px;
  }
  .match{ background:var(--panel); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
  .slot{
    padding:11px 13px; font-size:.9rem;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    border-bottom:1px solid var(--border); cursor:pointer;
  }
  .slot:last-child{ border-bottom:none; }
  .slot:not(.disabled):active{ background:rgba(255,255,255,.06); }
  .slot.winner{ color:var(--gold); font-weight:700; background:rgba(232,168,56,.12); }
  .slot.bye{ color:var(--text-dim); font-style:italic; cursor:default; }
  .slot.pending{ color:#4b5468; cursor:default; }
  .slot.disabled{ cursor:default; }

  .champion{
    max-width:380px; margin:6px auto 30px; text-align:center;
    padding:22px;
    background:linear-gradient(135deg, rgba(232,168,56,.14), rgba(95,179,168,.08));
    border:1px solid var(--gold); border-radius:14px;
  }
  .champion .trophy{ font-size:2.1rem; margin-top:6px; }
  .champion .name{ font-size:1.35rem; font-weight:800; margin-top:4px; }
  .champion .sub{ color:var(--text-dim); font-size:.8rem; margin-top:2px; }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Single elimination</div>
  <h1>Bracket</h1>
  <div class="title-rule"></div>
  <p>Lägg till spelare → lotta fram bracket → tryck på vinnaren efter varje match.</p>
</header>

<div class="setup">
  <textarea id="bulkInput" placeholder="Klistra in namn, ett per rad..."></textarea>
  <button class="ghost-btn" id="bulkAddBtn">Lägg till namnen</button>

  <div class="row">
    <input type="text" id="singleInput" placeholder="...eller ett namn i taget">
    <button class="add-btn" id="addBtn">Lägg till</button>
  </div>

  <div class="taglist" id="taglist"></div>
  <div class="count" id="count"></div>

  <button class="main-btn" id="generateBtn">🎲 Lotta bracket</button>
</div>

<div id="bracketArea"></div>

<script>
(function(){
  let players = [];
  let bracket = null;

  const bulkInput = document.getElementById('bulkInput');
  const bulkAddBtn = document.getElementById('bulkAddBtn');
  const singleInput = document.getElementById('singleInput');
  const addBtn = document.getElementById('addBtn');
  const taglist = document.getElementById('taglist');
  const countEl = document.getElementById('count');
  const generateBtn = document.getElementById('generateBtn');
  const bracketArea = document.getElementById('bracketArea');

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function addNames(text){
    text.split('\n').map(s=>s.trim()).filter(Boolean).forEach(n=>{
      if(!players.includes(n)) players.push(n);
    });
  }

  bulkAddBtn.addEventListener('click', ()=>{
    addNames(bulkInput.value);
    bulkInput.value = '';
    renderTags();
  });

  function addSingle(){
    const v = singleInput.value.trim();
    if(v && !players.includes(v)){
      players.push(v);
      singleInput.value = '';
      renderTags();
    }
    singleInput.focus();
  }
  addBtn.addEventListener('click', addSingle);
  singleInput.addEventListener('keydown', e=>{
    if(e.key === 'Enter'){ e.preventDefault(); addSingle(); }
  });

  function renderTags(){
    taglist.innerHTML = players.map(p =>
      `<span class="tag">${escapeHtml(p)}<button data-name="${escapeHtml(p)}">×</button></span>`
    ).join('');
    taglist.querySelectorAll('button').forEach(b=>{
      b.addEventListener('click', ()=>{
        players = players.filter(p => p !== b.dataset.name);
        renderTags();
      });
    });
    countEl.textContent = players.length + (players.length===1 ? ' spelare tillagd' : ' spelare tillagda') + (players.length < 2 ? ' (minst 2 krävs)' : '');
  }

  function shuffle(arr){
    const a = arr.slice();
    for(let i=a.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      const tmp=a[i]; a[i]=a[j]; a[j]=tmp;
    }
    return a;
  }

  function buildBracket(list){
    const names = shuffle(list);
    const n = names.length;
    let size = 1;
    while(size < n) size *= 2;
    const numMatches = size / 2;
    const byes = size - n;

    const idxPool = [];
    for(let i=0;i<numMatches;i++) idxPool.push(i);
    const byeMatches = new Set(shuffle(idxPool).slice(0, byes));

    const round0 = [];
    let p = 0;
    for(let i=0;i<numMatches;i++){
      if(byeMatches.has(i)){
        const name = names[p++];
        round0.push(Math.random() < 0.5 ? {p1:name,p2:null,pick:null} : {p1:null,p2:name,pick:null});
      } else {
        const a = names[p++], b = names[p++];
        round0.push({p1:a, p2:b, pick:null});
      }
    }

    const rounds = [round0];
    let cnt = numMatches;
    while(cnt > 1){
      cnt = cnt/2;
      const r = [];
      for(let i=0;i<cnt;i++) r.push({p1:undefined, p2:undefined, pick:null});
      rounds.push(r);
    }
    return rounds;
  }

  generateBtn.addEventListener('click', ()=>{
    if(players.length < 2){
      alert('Lägg till minst 2 spelare först.');
      return;
    }
    bracket = buildBracket(players);
    renderBracket();
  });

  function roundLabel(matches){
    if(matches===1) return 'Final';
    if(matches===2) return 'Semifinal';
    if(matches===4) return 'Kvartsfinal';
    if(matches===8) return 'Åttondelsfinal';
    if(matches===16) return 'Sextondelsfinal';
    return 'Omgång (' + matches*2 + ')';
  }

  function computeWinners(){
    const winnersPerRound = [];
    for(let r=0;r<bracket.length;r++){
      const round = bracket[r];
      const winners = [];
      for(let i=0;i<round.length;i++){
        const m = round[i];
        let p1, p2;
        if(r===0){
          p1 = m.p1; p2 = m.p2;
        } else {
          p1 = winnersPerRound[r-1][2*i];
          p2 = winnersPerRound[r-1][2*i+1];
          m.p1 = p1; m.p2 = p2;
        }
        let winner;
        if(p1===null && typeof p2==='string') winner = p2;
        else if(p2===null && typeof p1==='string') winner = p1;
        else if(typeof p1==='string' && typeof p2==='string') winner = (m.pick===p1 || m.pick===p2) ? m.pick : undefined;
        else winner = undefined;
        winners.push(winner);
      }
      winnersPerRound.push(winners);
    }
    return winnersPerRound;
  }

  function slotHtml(name, other, winnerName, r, i){
    if(name === null) return '<div class="slot bye">Frilott</div>';
    if(name === undefined) return '<div class="slot pending">Väntar …</div>';
    const isWinner = winnerName === name;
    const decidable = typeof other === 'string';
    const cls = ['slot'];
    if(isWinner) cls.push('winner');
    if(!decidable) cls.push('disabled');
    const attrs = decidable ? ` data-pick="${escapeHtml(name)}" data-r="${r}" data-i="${i}"` : '';
    return `<div class="${cls.join(' ')}"${attrs}>${escapeHtml(name)}${isWinner ? ' ✓' : ''}</div>`;
  }

  function renderBracket(){
    const results = computeWinners();
    let html = '<div class="bracket-wrap"><div class="bracket">';
    bracket.forEach((round, r)=>{
      html += `<div class="round"><div class="round-title">${roundLabel(round.length)}</div>`;
      round.forEach((m,i)=>{
        const w = results[r][i];
        html += '<div class="match">' + slotHtml(m.p1, m.p2, w, r, i) + slotHtml(m.p2, m.p1, w, r, i) + '</div>';
      });
      html += '</div>';
    });
    html += '</div></div>';

    const champion = results[bracket.length-1][0];
    if(champion){
      html += `<div class="champion"><div class="eyebrow">Slutresultat</div><div class="trophy">🏆</div><div class="name">${escapeHtml(champion)}</div><div class="sub">vinner turneringen</div></div>`;
    }

    bracketArea.innerHTML = html;
    bracketArea.querySelectorAll('[data-pick]').forEach(el=>{
      el.addEventListener('click', ()=>{
        const r = +el.dataset.r, i = +el.dataset.i;
        bracket[r][i].pick = el.dataset.pick;
        renderBracket();
      });
    });
  }

  renderTags();
})();
</script>
</body>
</html>
